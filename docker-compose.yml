services:
  postgres:
    image: postgres:latest
    container_name: my-postgres
    networks:
      my_network:
        ipv4_address: 172.20.0.5
    environment:
      POSTGRES_USER: my_user
      POSTGRES_PASSWORD: abcd1234
      POSTGRES_DB: kafka_example
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data


  redis:
    image: redis:latest
    container_name: my-redis
    networks:
      my_network:
        ipv4_address: 172.20.0.6
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
  
  kafka1:
    image: apache/kafka:4.1.1
    hostname: kafka1
    container_name: kafka1
    user: "0:0"
    command: >
      bash -c "chown -R appuser:appuser /var/kafka/data && exec su appuser -c '/__cacert_entrypoint.sh /etc/kafka/docker/run'"
    networks:
      my_network:
        ipv4_address: 172.20.0.101
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://172.20.0.101:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      CLUSTER_ID: 'fEhAzqLPS8aklU4iXPqqbA'
      KAFKA_LOG_DIRS: /var/kafka/data
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: kafka1
      KAFKA_OPTS: -javaagent:/tmp/jmx_prometheus_javaagent-1.1.0.jar=8091:/tmp/kafka_config.yml
    volumes:
      - kafka-data1:/var/kafka/data
      - ./monitoring/prometheus/jmx_prometheus_javaagent-1.1.0.jar:/tmp/jmx_prometheus_javaagent-1.1.0.jar
      - ./monitoring/prometheus/kafka_config.yml:/tmp/kafka_config.yml

  kafka2:
    image: apache/kafka:4.1.1
    hostname: kafka2
    container_name: kafka2
    user: "0:0"
    command: >
      bash -c "chown -R appuser:appuser /var/kafka/data && exec su appuser -c '/__cacert_entrypoint.sh /etc/kafka/docker/run'"
    networks:
      my_network:
        ipv4_address: 172.20.0.102
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://172.20.0.102:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      CLUSTER_ID: 'fEhAzqLPS8aklU4iXPqqbA'
      KAFKA_LOG_DIRS: /var/kafka/data
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: kafka2
      KAFKA_OPTS: -javaagent:/tmp/jmx_prometheus_javaagent-1.1.0.jar=8091:/tmp/kafka_config.yml
    volumes:
      - kafka-data2:/var/kafka/data
      - ./monitoring/prometheus/jmx_prometheus_javaagent-1.1.0.jar:/tmp/jmx_prometheus_javaagent-1.1.0.jar
      - ./monitoring/prometheus/kafka_config.yml:/tmp/kafka_config.yml

  kafka3:
    image: apache/kafka:4.1.1
    hostname: kafka3
    container_name: kafka3
    user: "0:0"
    command: >
      bash -c "chown -R appuser:appuser /var/kafka/data && exec su appuser -c '/__cacert_entrypoint.sh /etc/kafka/docker/run'"
    networks:
      my_network:
        ipv4_address: 172.20.0.103
    ports:
      - "9094:9092"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://172.20.0.103:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      CLUSTER_ID: 'fEhAzqLPS8aklU4iXPqqbA'
      KAFKA_LOG_DIRS: /var/kafka/data
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: kafka3
      KAFKA_OPTS: -javaagent:/tmp/jmx_prometheus_javaagent-1.1.0.jar=8091:/tmp/kafka_config.yml
    volumes:
      - kafka-data3:/var/kafka/data
      - ./monitoring/prometheus/jmx_prometheus_javaagent-1.1.0.jar:/tmp/jmx_prometheus_javaagent-1.1.0.jar
      - ./monitoring/prometheus/kafka_config.yml:/tmp/kafka_config.yml

  kafka-connect:
    image: confluentinc/cp-kafka-connect:latest
    hostname: kafka-connect
    container_name: kafka-connect
    networks:
      my_network:
        ipv4_address: 172.20.0.10
    depends_on:
      - postgres
      - redis
      - kafka1
      - kafka2
      - kafka3
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: 172.20.0.101:9092,172.20.0.102:9092,172.20.0.103:9092
      CONNECT_REST_ADVERTISED_PORT: 8083
      CONNECT_REST_PORT: 8083
      CONNECT_LISTENERS: http://0.0.0.0:8083
      CONNECT_GROUP_ID: connect-cluster
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "3"
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "3"
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "3"
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components,/opt/kafka/connectors"
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      KAFKA_OPTS: -javaagent:/tmp/jmx_prometheus_javaagent-1.1.0.jar=8091:/tmp/kafka_connect_config.yml
    volumes:
      - ./connectors:/opt/kafka/connectors
      - ./monitoring/prometheus/jmx_prometheus_javaagent-1.1.0.jar:/tmp/jmx_prometheus_javaagent-1.1.0.jar
      - ./monitoring/prometheus/kafka_connect_config.yml:/tmp/kafka_connect_config.yml

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      my_network:
        ipv4_address: 172.20.0.20
    ports:
      - "9090:9090"
    depends_on:
      - kafka1
      - kafka2
      - kafka3
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-data:/prometheus

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      my_network:
        ipv4_address: 172.20.0.21
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_PATHS_CONFIG: /etc/grafana/config.ini
    volumes:
        - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
        - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
        - ./monitoring/grafana/config.ini:/etc/grafana/config.ini

networks:
  my_network:
    name: kafka-network
    external: true  

volumes:
  postgres-data:
    driver: local
  kafka-data1:
    driver: local
  kafka-data2:
    driver: local
  kafka-data3:
    driver: local
